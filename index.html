<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreMMC | Premium VPS Hosting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Base Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #020617; color: white; overflow-x: hidden; }

        /* Background Image (Server Room) */
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                        url('https://raw.githubusercontent.com/supergmt95/minecraft-hosting/main/1000080853.jpg'); /* Using your server image */
            background-size: cover; background-position: center;
            z-index: -10; filter: saturate(1.2);
        }

        /* Snowflake Animation */
        .snowflake { position: fixed; top: -10px; z-index: 5; color: white; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* Navbar */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #3b82f6; }
        .logo span { color: #3b82f6; }

        /* Hero Section */
        .hero { padding: 120px 20px 40px; text-align: center; }
        .badge { background: rgba(59, 130, 246, 0.15); color: #60a5fa; padding: 6px 18px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 15px; border: 1px solid rgba(59, 130, 246, 0.4); }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 20px; font-weight: 900; }
        h1 span { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        /* Location & Language Info Bar */
        .extra-info-bar {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px;
        }
        .info-tag {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 15px; border-radius: 10px; font-size: 13px; display: flex; align-items: center; gap: 8px;
        }
        .info-tag i { color: #facc15; }

        /* Tab Navigation */
        .tab-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
        .tab-btn { 
            padding: 12px 22px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; color: #d1d5db; cursor: pointer; font-weight: 700; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        /* Plans Grid */
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .card { 
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 30px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: left;
            backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-10px); border-color: #3b82f6; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2); }
        
        .plan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .plan-name { font-size: 1.5rem; font-weight: 800; }
        .price-tag h3 { font-size: 1.8rem; color: #fff; }
        .price-tag span { font-size: 11px; color: #94a3b8; display: block; text-align: right; }

        .specs-list { list-style: none; margin-bottom: 30px; }
        .specs-list li { font-size: 14px; color: #cbd5e1; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .specs-list li i { color: #3b82f6; font-size: 16px; }

        .btn-order { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-weight: 800; cursor: pointer; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none;
        }
        .btn-order:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Footer Info */
        .support-box { margin-top: 50px; padding: 30px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px dashed rgba(255,255,255,0.2); display: inline-block; }
        .support-link { color: #3b82f6; text-decoration: none; font-weight: bold; }

        @media (max-width: 768px) {
            .tab-btn { padding: 10px 15px; font-size: 12px; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body id="mainBody">

    <div class="main-bg"></div>

    <nav>
        <a href="#" class="logo">
            <img src="https://cdn.discordapp.com/attachments/1457594773010518086/1480537990446190726/copilot_image_1761965106943.jpg" alt="CoreMMC">
            <span>CoreMMC Hosting</span>
        </a>
        <a href="https://discord.gg/SvQSv5E53" class="tab-btn active" style="padding: 8px 15px;"><i class="fab fa-discord"></i> Discord Support</a>
    </nav>

    <section class="hero">
        <div class="badge" id="pageBadge">BUDGET SERIES</div>
        <h1 id="heroTitle">CoreMMC <span>Budget VPS</span></h1>
        
        <div class="extra-info-bar">
            <div class="info-tag"><i class="fas fa-bolt"></i> Locations: India 🇮🇳, Germany 🇩🇪</div>
            <div class="info-tag"><i class="fas fa-language"></i> Lang: English (USA) 🇺🇸, Urdu/Hindi 🇵🇰🇮🇳</div>
            <div class="info-tag"><i class="fas fa-money-bill-wave"></i> Currency: INR / USD</div>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchPage('budget', this)"><i class="fas fa-wallet"></i> Budget VPS</button>
            <button class="tab-btn" onclick="switchPage('intel', this)"><i class="fas fa-microchip"></i> Intel VPS</button>
            <button class="tab-btn" onclick="switchPage('amd', this)"><i class="fas fa-server"></i> AMD Epyc VPS</button>
            <button class="tab-btn" onclick="switchPage('ryzen', this)"><i class="fas fa-fire"></i> Ryzen 9 VPS</button>
        </div>

        <div class="plans-grid" id="plansContainer"></div>

        <div class="support-box">
            <p>Need custom configuration or help?</p>
            <p>Contact Support via Discord: <a href="https://discord.gg/SvQSv5E53" class="support-link">discord.gg/coremmc</a></p>
        </div>
    </section>

    <script>
        const allData = {
            budget: {
                badge: "BUDGET SERIES",
                title: "CoreMMC <span>Budget VPS</span>",
                plans: [
                    { name: "NOOB", price: "60", ram: "1GB", cpu: "1 vCPU", ssd: "20GB SSD", extra: "1 TB Bandwidth" },
                    { name: "AMATEUR", price: "120", ram: "2GB", cpu: "1-2 vCPU", ssd: "40GB SSD", extra: "2 TB Bandwidth" },
                    { name: "PRO", price: "240", ram: "4GB", cpu: "2 vCPU", ssd: "80GB SSD", extra: "3 TB Bandwidth" },
                    { name: "ELITE", price: "360", ram: "6GB", cpu: "3 vCPU", ssd: "120GB SSD", extra: "4 TB Bandwidth" },
                    { name: "MASTER", price: "480", ram: "8GB", cpu: "4 vCPU", ssd: "160GB SSD", extra: "5 TB Bandwidth" },
                    { name: "GRANDMASTER", price: "720", ram: "12GB", cpu: "6 vCPU", ssd: "240GB SSD", extra: "6 TB Bandwidth" }
                ]
            },
            intel: {
                badge: "INTEL HIGH-PERFORMANCE",
                title: "Intel <span>Next-Gen VPS</span>",
                plans: [
                    { name: "ULTIMATE VPS", price: "340", ram: "12GB DDR4", cpu: "4 vCores", ssd: "100GB NVMe", extra: "Turbo Speed" },
                    { name: "PRO VPS", price: "450", ram: "16GB DDR4", cpu: "6 vCores", ssd: "120GB NVMe", extra: "Dedicated Resources" },
                    { name: "EXTREME VPS", price: "750", ram: "24GB DDR4", cpu: "8 vCores", ssd: "200GB NVMe", extra: "VIP Support" },
                    { name: "MEGA VPS", price: "950", ram: "32GB DDR4", cpu: "10 vCores", ssd: "250GB NVMe", extra: "Enterprise Node" },
                    { name: "TITAN VPS", price: "1370", ram: "48GB DDR4", cpu: "14 vCores", ssd: "400GB NVMe", extra: "Full Root Access" }
                ]
            },
            amd: {
                badge: "AMD EPYC POWER",
                title: "AMD <span>Epyc Servers</span>",
                plans: [
                    { name: "EPYC-1", price: "500", ram: "10GB", cpu: "4 vCores", ssd: "100GB NVMe", extra: "DDoS Protected" },
                    { name: "EPYC-2", price: "1000", ram: "20GB", cpu: "8 vCores", ssd: "200GB NVMe", extra: "Instant Setup" }
                ]
            },
            ryzen: {
                badge: "RYZEN 9 EXTREME",
                title: "Ryzen 9 <span>Performance</span>",
                plans: [
                    { name: "RYZEN-R1", price: "600", ram: "8GB", cpu: "2 Dedicated", ssd: "60GB NVMe", extra: "Game Optimized" },
                    { name: "RYZEN-GOD", price: "2000", ram: "32GB", cpu: "8 Dedicated", ssd: "250GB NVMe", extra: "Unmatched Power" }
                ]
            }
        };

        function switchPage(pageKey, btnElement) {
            const data = allData[pageKey];
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            document.getElementById('pageBadge').innerText = data.badge;
            document.getElementById('heroTitle').innerHTML = data.title;

            const container = document.getElementById('plansContainer');
            container.innerHTML = '';
            
            data.plans.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <div class="plan-header">
                            <div class="plan-name">${p.name}</div>
                            <div class="price-tag">
                                <h3>₹${p.price}</h3>
                                <span>/monthly</span>
                            </div>
                        </div>
                        <ul class="specs-list">
                            <li><i class="fas fa-memory"></i> ${p.ram} RAM</li>
                            <li><i class="fas fa-microchip"></i> ${p.cpu} CPU</li>
                            <li><i class="fas fa-hdd"></i> ${p.ssd}</li>
                            <li><i class="fas fa-shield-halved"></i> DDoS Protection</li>
                            <li><i class="fas fa-check-circle"></i> ${p.extra}</li>
                        </ul>
                        <a href="https://discord.com/channels/1331996056971641055/1457357769320698032" class="btn-order">
                            <i class="fas fa-rocket"></i> Order Now
                        </a>
                    </div>
                `;
            });
        }

        function createSnow() {
            const snow = document.createElement('div');
            snow.classList.add('snowflake');
            snow.innerHTML = '❄';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = (Math.random() * 3 + 2) + 's';
            snow.style.opacity = Math.random();
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }

        switchPage('budget', document.querySelector('.tab-btn'));
        setInterval(createSnow, 100);
    </script>
</body>
</html>
