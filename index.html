<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreMMC | Premium VPS Hosting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Base Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #050816; color: white; overflow-x: hidden; }


        /* Background GIF */
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://cdn.discordapp.com/attachments/1457594773010518086/1495356422190272702/data-server-racks-hub-room-with-big-data-computer-center-blue-interior-hosting-storage-hardware.jpg?ex=69e5f2b1&is=69e4a131&hm=9dd1c82c1d60bae7c127889a724c861c72a924ca32d9fe9dc3cfcbfc296990b0&') center/cover;
            filter: blur(8px) brightness(0.3); z-index: -10;
        }

        /* Snowflake Animation */
        .snowflake { position: fixed; top: -10px; z-index: 5; color: white; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* Navbar */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #facc15; }
        .logo span { color: #facc15; }

        /* Hero & Switcher */
        .hero { padding: 120px 20px 40px; text-align: center; }
        .badge { background: rgba(59, 130, 246, 0.15); color: #60a5fa; padding: 6px 18px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 20px; border: 1px solid rgba(59, 130, 246, 0.4); }
        h1 { font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 25px; font-weight: 900; }
        h1 span { color: #3b82f6; }

        /* 4-Page Navigation Tab */
        .tab-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .tab-btn { 
            padding: 12px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; color: #9ca3af; cursor: pointer; font-weight: 700; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .tab-btn:hover { background: rgba(59, 130, 246, 0.2); color: white; }

        /* Info Box */
        .info-box { 
            max-width: 800px; margin: 0 auto 40px; padding: 20px; 
            background: rgba(255,255,255,0.03); border-radius: 15px; border-left: 4px solid #3b82f6;
            text-align: left; font-size: 14px; color: #d1d5db;
        }

        /* Plans Grid */
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
        
        .card { 
            background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 20px; padding: 25px; transition: 0.4s; text-align: left;
            position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); border-color: #3b82f6; }
        
        .plan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .plan-name { font-size: 1.4rem; font-weight: 800; }
        .price-tag { text-align: right; }
        .price-tag h3 { font-size: 1.6rem; color: #fff; }
        .price-tag span { font-size: 11px; color: #aaa; display: block; }

        .specs-list { list-style: none; margin-bottom: 25px; }
        .specs-list li { font-size: 13px; color: #d1d5db; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .specs-list li i { color: #3b82f6; width: 18px; }

        .btn-buy { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            background: #3b82f6; color: white; font-weight: 800; cursor: pointer; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-buy:hover { filter: brightness(1.2); }

        /* Red Theme for High End Sections */
        .theme-red .tab-btn.active { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .theme-red .info-box { border-left-color: #ef4444; }
        .theme-red .specs-list li i { color: #ef4444; }
        .theme-red .btn-buy { background: #ef4444; }
        .theme-red h1 span { color: #ef4444; }

        @media (max-width: 768px) {
            .hero { padding-top: 100px; }
            .plans-grid { padding: 0 15px; }
        }
    </style>
</head>
<body id="mainBody">

    <div class="main-bg"></div>

    <nav>
        <a href="#" class="logo">
            <img src="https://cdn.discordapp.com/attachments/1457594773010518086/1480537990446190726/copilot_image_1761965106943.jpg" alt="CoreMMC">
            <span>CoreMMC</span>
        </a>
        <div style="font-size: 12px; font-weight: bold; color: #aaa;">VPS DASHBOARD</div>
    </nav>

    <section class="hero">
        <div class="badge" id="pageBadge">BUDGET SERIES</div>
        <h1 id="heroTitle">CoreMMC <span>Budget VPS</span></h1>
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchPage('budget', this)">
                <i class="fas fa-wallet"></i> Budget VPS
            </button>
            <button class="tab-btn" onclick="switchPage('intel', this)">
                <i class="fas fa-microchip"></i> Intel VPS
            </button>
            <button class="tab-btn" onclick="switchPage('amd', this)">
                <i class="fas fa-server"></i> AMD Epyc VPS
            </button>
            <button class="tab-btn" onclick="switchPage('ryzen', this)">
                <i class="fas fa-bolt"></i> Ryzen 9 VPS
            </button>
        </div>

        <div class="info-box" id="infoBox">
            Low-cost, high-reliability VPS hosting. Perfect for small projects, discord bots, and lightweight applications. OS: Linux/Ubuntu supported.
        </div>

        <div class="plans-grid" id="plansContainer">
            </div>
    </section>

    <script>
        const allData = {
            budget: {
                badge: "BUDGET SERIES",
                title: "CoreMMC <span>Budget VPS</span>",
                info: "Instant Setup, Low Latency, and Full Root Access. Ideal for starters and small projects.",
                theme: "theme-blue",
                plans: [
                    { name: "NOOB", price: "60", ram: "1GB", cpu: "1 vCPU", ssd: "20GB SSD", extra: "1 TB Bandwidth" },
                    { name: "AMATEUR", price: "120", ram: "2GB", cpu: "1-2 vCPU", ssd: "40GB SSD", extra: "2 TB Bandwidth" },
                    { name: "PRO", price: "240", ram: "4GB", cpu: "2 vCPU", ssd: "80GB SSD", extra: "3 TB Bandwidth" },
                    { name: "ELITE", price: "360", ram: "6GB", cpu: "3 vCPU", ssd: "120GB SSD", extra: "4 TB Bandwidth" },
                    { name: "MASTER", price: "480", ram: "8GB", cpu: "4 vCPU", ssd: "160GB SSD", extra: "5 TB Bandwidth" },
                    { name: "GRANDMASTER", price: "720", ram: "12GB", cpu: "6 vCPU", ssd: "240GB SSD", extra: "6 TB Bandwidth" }
                ]
            },
            intel: {
                badge: "INTEL NEXT-GEN",
                title: "Intel <span>Xeon VPS</span>",
                info: "Powering Your Vision with High-Performance Nodes. Dedicated resources bina kisi lag ke.",
                theme: "theme-blue",
                plans: [
                    { name: "ULTIMATE VPS", price: "340", ram: "12GB DDR4", cpu: "4 vCores", ssd: "100GB NVMe", extra: "VIP Support" },
                    { name: "PRO VPS", price: "450", ram: "16GB DDR4", cpu: "6 vCores", ssd: "120GB NVMe", extra: "Dedicated Resources" },
                    { name: "EXTREME VPS", price: "750", ram: "24GB DDR4", cpu: "8 vCores", ssd: "200GB NVMe", extra: "Turbo Speed" },
                    { name: "MEGA VPS", price: "950", ram: "32GB DDR4", cpu: "10 vCores", ssd: "250GB NVMe", extra: "Enterprise Node" },
                    { name: "TITAN VPS", price: "1370", ram: "48GB DDR4", cpu: "14 vCores", ssd: "400GB NVMe", extra: "Full Access" }
                ]
            },
            amd: {
                badge: "AMD EPVC POWER",
                title: "AMD Epyc <span>VPS Hosting</span>",
                info: "Maximum multi-core efficiency with AMD Epyc processors. Best for heavy databases and multi-threaded apps.",
                theme: "theme-red",
                plans: [
                    { name: "EPYC-S1", price: "400", ram: "8GB", cpu: "4 vCores", ssd: "80GB NVMe", extra: "High Bandwidth" },
                    { name: "EPYC-S2", price: "800", ram: "16GB", cpu: "8 vCores", ssd: "150GB NVMe", extra: "Premium Anti-DDoS" },
                    { name: "EPYC-MAX", price: "1500", ram: "32GB", cpu: "16 vCores", ssd: "300GB NVMe", extra: "Unlimited Ports" }
                ]
            },
            ryzen: {
                badge: "RYZEN 9 EXTREME",
                title: "Ryzen 9 <span>Performance</span>",
                info: "Single-thread beast! Ryzen 9 nodes are perfect for high-slot game servers and heavy development.",
                theme: "theme-red",
                plans: [
                    { name: "RYZEN-R1", price: "600", ram: "8GB DDR4", cpu: "2 Dedicated", ssd: "60GB Gen4 NVMe", extra: "Ultra Low Latency" },
                    { name: "RYZEN-R2", price: "1100", ram: "16GB DDR4", cpu: "4 Dedicated", ssd: "120GB Gen4 NVMe", extra: "Extreme Performance" },
                    { name: "RYZEN-GOD", price: "2200", ram: "32GB DDR4", cpu: "8 Dedicated", ssd: "250GB Gen4 NVMe", extra: "Unmatched Speed" },
                    { name: "RYZEN", price: "2400", ram: "32GB DDR4", cpu: "8 Dedicated", ssd: "250GB Gen4 NVMe", extra: "Unmatched Speed" }
                ]
            }
        };

        function switchPage(pageKey, btnElement) {
            const data = allData[pageKey];
            const body = document.getElementById('mainBody');
            
            // Update Active Button
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Update Theme
            body.className = data.theme;

            // Update Header
            document.getElementById('pageBadge').innerText = data.badge;
            document.getElementById('heroTitle').innerHTML = data.title;
            document.getElementById('infoBox').innerText = data.info;

            // Render Plans
            const container = document.getElementById('plansContainer');
            container.innerHTML = '';
            
            data.plans.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <div class="plan-header">
                            <div class="plan-name">${p.name}</div>
                            <div class="price-tag">
                                <h3>₹${p.price}</h3>
                                <span>/monthly</span>
                            </div>
                        </div>
                        <ul class="specs-list">
                            <li><i class="fas fa-memory"></i> ${p.ram} RAM</li>
                            <li><i class="fas fa-microchip"></i> ${p.cpu} CPU</li>
                            <li><i class="fas fa-hdd"></i> ${p.ssd}</li>
                            <li><i class="fas fa-shield-halved"></i> ${p.extra}</li>
                            <li><i class="fas fa-check"></i> DDoS Protection</li>
                        </ul>
                        <button class="btn-buy" onclick="window.location.href='https://discord.com/channels/1331996056971641055/1457357769320698032'">
                            <i class="fas fa-ticket-alt"></i> Order Now
                        </button>
                    </div>
                `;
            });
        }
        
        // Snow Effect
        function createSnow() {
            const snow = document.createElement('div');
            snow.classList.add('snowflake');
            snow.innerHTML = '❄';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = (Math.random() * 3 + 2) + 's';
            snow.style.opacity = Math.random();
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }

        // Initial Load
        switchPage('budget', document.querySelector('.tab-btn'));
        setInterval(createSnow, 100);
    </script>
</body>
</html>
